<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BB VPN — Logo Variants</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    font-family: sans-serif;
    color: #fff;
    padding: 40px 20px;
  }
  h1 {
    text-align: center;
    color: #ff69b4;
    margin-bottom: 40px;
    font-size: 22px;
    letter-spacing: 2px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .card-title {
    color: #888;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  svg { display: block; }
</style>
</head>
<body>
<h1>BIG BOOTY VPN — Logo Variants (Style 4: Fun/Anime)</h1>
<div class="grid">

  <!-- Variant 1: Cat Ears Badge -->
  <div class="card">
    <div class="card-title">Вариант 1 — Cat Badge</div>
    <svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Ears -->
      <polygon points="90,80 110,30 130,80" fill="#ff69b4" stroke="#ff1493" stroke-width="2"/>
      <polygon points="98,78 110,48 122,78" fill="#ffb6d9"/>
      <polygon points="190,80 210,30 230,80" fill="#ff69b4" stroke="#ff1493" stroke-width="2"/>
      <polygon points="198,78 210,48 222,78" fill="#ffb6d9"/>
      <!-- Face circle -->
      <ellipse cx="160" cy="115" rx="85" ry="75" fill="#fff5f9" stroke="#ff69b4" stroke-width="3"/>
      <!-- Eyes -->
      <ellipse cx="135" cy="105" rx="12" ry="14" fill="#2a2a2a"/>
      <ellipse cx="185" cy="105" rx="12" ry="14" fill="#2a2a2a"/>
      <circle cx="139" cy="101" r="4" fill="#fff"/>
      <circle cx="189" cy="101" r="4" fill="#fff"/>
      <circle cx="131" cy="109" r="2" fill="#ff69b4" opacity="0.6"/>
      <circle cx="181" cy="109" r="2" fill="#ff69b4" opacity="0.6"/>
      <!-- Nose -->
      <ellipse cx="160" cy="120" rx="4" ry="3" fill="#ff9ab5"/>
      <!-- Mouth -->
      <path d="M150,128 Q160,138 170,128" stroke="#cc3366" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Whiskers -->
      <line x1="80" y1="118" x2="140" y2="122" stroke="#ccc" stroke-width="1.5" opacity="0.7"/>
      <line x1="80" y1="126" x2="140" y2="126" stroke="#ccc" stroke-width="1.5" opacity="0.7"/>
      <line x1="180" y1="122" x2="240" y2="118" stroke="#ccc" stroke-width="1.5" opacity="0.7"/>
      <line x1="180" y1="126" x2="240" y2="126" stroke="#ccc" stroke-width="1.5" opacity="0.7"/>
      <!-- Text -->
      <text x="160" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#ff1493" letter-spacing="2">BIG BOOTY VPN</text>
    </svg>
  </div>

  <!-- Variant 2: Tail Wrap Logo -->
  <div class="card">
    <div class="card-title">Вариант 2 — Tail Wrap</div>
    <svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ff69b4"/>
          <stop offset="100%" style="stop-color:#c850c0"/>
        </linearGradient>
      </defs>
      <!-- Tail curling around -->
      <path d="M50,160 Q20,80 80,50 Q140,20 200,60 Q260,100 240,160 Q220,190 160,185 Q80,180 50,160Z"
            fill="none" stroke="#ff69b4" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
      <path d="M50,160 Q20,80 80,50 Q140,20 200,60 Q260,100 240,160"
            fill="none" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round"/>
      <!-- Fluffy tip -->
      <ellipse cx="240" cy="158" rx="18" ry="14" fill="#ffb6d9" transform="rotate(-20,240,158)"/>
      <ellipse cx="248" cy="150" rx="12" ry="9" fill="#fff0f7" transform="rotate(-20,248,150)"/>
      <!-- BB letters -->
      <text x="100" y="115" font-family="Impact, sans-serif" font-size="52" fill="url(#grad2)" letter-spacing="2">BB</text>
      <!-- VPN text -->
      <text x="103" y="145" font-family="Arial, sans-serif" font-size="16" fill="#ddd" letter-spacing="8">VPN</text>
      <!-- Paw stamp -->
      <circle cx="265" cy="50" r="14" fill="#ff69b4" opacity="0.8"/>
      <circle cx="253" cy="40" r="7" fill="#ff69b4" opacity="0.8"/>
      <circle cx="265" cy="36" r="7" fill="#ff69b4" opacity="0.8"/>
      <circle cx="277" cy="40" r="7" fill="#ff69b4" opacity="0.8"/>
    </svg>
  </div>

  <!-- Variant 3: Chibi Silhouette -->
  <div class="card">
    <div class="card-title">Вариант 3 — Chibi Silhouette</div>
    <svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#ff69b4"/>
          <stop offset="50%" style="stop-color:#ff1493"/>
          <stop offset="100%" style="stop-color:#c850c0"/>
        </linearGradient>
      </defs>
      <!-- Chibi body silhouette -->
      <!-- Left ear -->
      <polygon points="65,55 75,25 88,55" fill="#ff69b4"/>
      <polygon points="69,53 75,33 82,53" fill="#ffb6d9"/>
      <!-- Right ear -->
      <polygon points="112,55 122,25 135,55" fill="#ff69b4"/>
      <polygon points="116,53 122,33 129,53" fill="#ffb6d9"/>
      <!-- Head -->
      <ellipse cx="100" cy="75" rx="42" ry="38" fill="#fff5f9" stroke="#ffaad4" stroke-width="2"/>
      <!-- Eyes sparkle -->
      <ellipse cx="85" cy="72" rx="9" ry="11" fill="#333"/>
      <ellipse cx="115" cy="72" rx="9" ry="11" fill="#333"/>
      <circle cx="88" cy="68" r="3.5" fill="#fff"/>
      <circle cx="118" cy="68" r="3.5" fill="#fff"/>
      <circle cx="82" cy="76" r="1.5" fill="#ff69b4" opacity="0.8"/>
      <circle cx="112" cy="76" r="1.5" fill="#ff69b4" opacity="0.8"/>
      <!-- Blush -->
      <ellipse cx="72" cy="82" rx="10" ry="6" fill="#ff9ab5" opacity="0.4"/>
      <ellipse cx="128" cy="82" rx="10" ry="6" fill="#ff9ab5" opacity="0.4"/>
      <!-- Smile -->
      <path d="M88,88 Q100,98 112,88" stroke="#cc3366" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Body -->
      <path d="M70,108 Q65,125 68,145 L132,145 Q135,125 130,108 Q115,115 100,115 Q85,115 70,108Z" fill="#ff69b4"/>
      <!-- Tail -->
      <path d="M68,140 Q40,155 35,175 Q50,180 65,168 Q70,155 75,145" fill="#ffb6d9" stroke="#ff69b4" stroke-width="1.5"/>
      <!-- Text -->
      <text x="175" y="75" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#grad3)">BIG</text>
      <text x="163" y="108" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#grad3)">BOOTY</text>
      <text x="175" y="141" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#grad3)">VPN</text>
    </svg>
  </div>

  <!-- Variant 4: Paw Shield -->
  <div class="card">
    <div class="card-title">Вариант 4 — Paw Shield</div>
    <svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#ff69b4"/>
          <stop offset="100%" style="stop-color:#8b0057"/>
        </linearGradient>
      </defs>
      <!-- Shield -->
      <path d="M160,15 L220,40 L220,110 Q220,155 160,180 Q100,155 100,110 L100,40 Z"
            fill="url(#grad4)" stroke="#ff1493" stroke-width="2"/>
      <path d="M160,28 L210,50 L210,108 Q210,148 160,168 Q110,148 110,108 L110,50 Z"
            fill="none" stroke="#ffb6d9" stroke-width="1" opacity="0.5"/>
      <!-- Paw on shield -->
      <!-- Main pad -->
      <ellipse cx="160" cy="115" rx="22" ry="18" fill="#ffb6d9" opacity="0.9"/>
      <!-- Toe pads -->
      <ellipse cx="138" cy="95" rx="10" ry="9" fill="#ffb6d9" opacity="0.9"/>
      <ellipse cx="155" cy="88" rx="10" ry="9" fill="#ffb6d9" opacity="0.9"/>
      <ellipse cx="172" cy="88" rx="10" ry="9" fill="#ffb6d9" opacity="0.9"/>
      <ellipse cx="185" cy="96" rx="10" ry="9" fill="#ffb6d9" opacity="0.9"/>
      <!-- Ear decorations top of shield -->
      <polygon points="130,18 140,2 150,18" fill="#ff1493"/>
      <polygon points="133,17 140,6 147,17" fill="#ffb6d9"/>
      <polygon points="170,18 180,2 190,18" fill="#ff1493"/>
      <polygon points="173,17 180,6 187,17" fill="#ffb6d9"/>
      <!-- Text -->
      <text x="160" y="192" text-anchor="middle" font-family="Impact, sans-serif" font-size="14" fill="#ff69b4" letter-spacing="3">BIG BOOTY VPN</text>
    </svg>
  </div>

  <!-- Variant 5: Three Stars + Text -->
  <div class="card">
    <div class="card-title">Вариант 5 — Trio Stars</div>
    <svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad5a" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffaacc"/>
          <stop offset="100%" style="stop-color:#cc0066"/>
        </linearGradient>
      </defs>
      <!-- Three chibi heads with cat ears -->
      <!-- Left head -->
      <polygon points="62,52 70,32 80,52" fill="#cc8899"/>
      <polygon points="65,51 70,37 76,51" fill="#ffd6e7"/>
      <ellipse cx="72" cy="70" rx="26" ry="24" fill="#fde8f0" stroke="#cc8899" stroke-width="1.5"/>
      <ellipse cx="63" cy="68" rx="5" ry="6" fill="#555"/>
      <ellipse cx="81" cy="68" rx="5" ry="6" fill="#555"/>
      <circle cx="65" cy="66" r="2" fill="#fff"/>
      <circle cx="83" cy="66" r="2" fill="#fff"/>
      <path d="M65,78 Q72,84 79,78" stroke="#994466" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Middle head (larger, center) -->
      <polygon points="148,42 160,16 172,42" fill="#ff69b4"/>
      <polygon points="152,41 160,22 168,41" fill="#ffddee"/>
      <ellipse cx="160" cy="66" rx="32" ry="29" fill="#fff5f9" stroke="#ff69b4" stroke-width="2"/>
      <ellipse cx="149" cy="63" rx="7" ry="8" fill="#2a2a2a"/>
      <ellipse cx="171" cy="63" rx="7" ry="8" fill="#2a2a2a"/>
      <circle cx="152" cy="60" r="2.5" fill="#fff"/>
      <circle cx="174" cy="60" r="2.5" fill="#fff"/>
      <ellipse cx="140" cy="70" rx="7" ry="4" fill="#ff9ab5" opacity="0.5"/>
      <ellipse cx="180" cy="70" rx="7" ry="4" fill="#ff9ab5" opacity="0.5"/>
      <path d="M151,76 Q160,86 169,76" stroke="#cc3366" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Right head -->
      <polygon points="240,52 250,32 260,52" fill="#9988bb"/>
      <polygon points="244,51 250,37 256,51" fill="#e8d6ff"/>
      <ellipse cx="250" cy="70" rx="26" ry="24" fill="#f0ebff" stroke="#9988bb" stroke-width="1.5"/>
      <ellipse cx="241" cy="68" rx="5" ry="6" fill="#444"/>
      <ellipse cx="259" cy="68" rx="5" ry="6" fill="#444"/>
      <circle cx="243" cy="66" r="2" fill="#fff"/>
      <circle cx="261" cy="66" r="2" fill="#fff"/>
      <path d="M243,78 Q250,84 257,78" stroke="#665588" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Decorative line -->
      <line x1="30" y1="112" x2="290" y2="112" stroke="#ff69b4" stroke-width="1" opacity="0.4"/>
      <!-- Main text -->
      <text x="160" y="145" text-anchor="middle" font-family="Impact, sans-serif" font-size="32" fill="url(#grad5a)" letter-spacing="3">BIG BOOTY</text>
      <text x="160" y="175" text-anchor="middle" font-family="Impact, sans-serif" font-size="22" fill="#cc99bb" letter-spacing="8">VPN</text>
    </svg>
  </div>

  <!-- Variant 6: Retro Anime Badge -->
  <div class="card">
    <div class="card-title">Вариант 6 — Retro Anime Badge</div>
    <svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#ff006e"/>
          <stop offset="100%" style="stop-color:#fb5607"/>
        </linearGradient>
      </defs>
      <!-- Outer badge shape -->
      <polygon points="160,5 200,18 230,48 240,85 230,122 200,152 160,165 120,152 90,122 80,85 90,48 120,18"
               fill="#1a0010" stroke="#ff006e" stroke-width="3"/>
      <polygon points="160,14 197,26 224,54 234,85 224,116 197,144 160,156 123,144 96,116 86,85 96,54 123,26"
               fill="none" stroke="#ff006e" stroke-width="1" opacity="0.4"/>
      <!-- Cat ears sticking out -->
      <polygon points="108,28 90,4 72,28" fill="#ff006e"/>
      <polygon points="104,27 90,10 76,27" fill="#ff6699"/>
      <polygon points="212,28 230,4 248,28" fill="#ff006e"/>
      <polygon points="208,27 230,10 244,27" fill="#ff6699"/>
      <!-- Big sparkle eyes -->
      <ellipse cx="135" cy="88" rx="18" ry="20" fill="#fff" stroke="#ff006e" stroke-width="2"/>
      <ellipse cx="185" cy="88" rx="18" ry="20" fill="#fff" stroke="#ff006e" stroke-width="2"/>
      <ellipse cx="135" cy="90" rx="11" ry="13" fill="#1a0010"/>
      <ellipse cx="185" cy="90" rx="11" ry="13" fill="#1a0010"/>
      <circle cx="130" cy="84" r="5" fill="#fff"/>
      <circle cx="180" cy="84" r="5" fill="#fff"/>
      <circle cx="140" cy="93" r="2" fill="#ff006e"/>
      <circle cx="190" cy="93" r="2" fill="#ff006e"/>
      <!-- Blush lines -->
      <line x1="108" y1="96" x2="122" y2="100" stroke="#ff6699" stroke-width="2" stroke-linecap="round"/>
      <line x1="108" y1="102" x2="122" y2="104" stroke="#ff6699" stroke-width="2" stroke-linecap="round"/>
      <line x1="198" y1="100" x2="212" y2="96" stroke="#ff6699" stroke-width="2" stroke-linecap="round"/>
      <line x1="198" y1="104" x2="212" y2="102" stroke="#ff6699" stroke-width="2" stroke-linecap="round"/>
      <!-- Mouth -->
      <path d="M148,112 Q160,124 172,112" stroke="#ff006e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Text -->
      <text x="160" y="148" text-anchor="middle" font-family="Impact, sans-serif" font-size="13" fill="url(#grad6)" letter-spacing="1">BIG BOOTY VPN</text>
    </svg>
  </div>

</div>
</body>
</html>
