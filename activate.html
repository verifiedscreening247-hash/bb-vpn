<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Activate — Big Booty VPN</title>

<body style="font-family:system-ui;background:#07020A;color:#f7e7ff;padding:24px">
  <h1>Activate your VPN</h1>
  <p>Enter a device name once — we’ll generate configs for <b>EU / US / SG</b>.</p>

  <label>Device name</label><br/>
  <input id="device" placeholder="" autocomplete="off"
    style="padding:10px;border-radius:10px;border:1px solid #fff2;background:#000;color:#fff;min-width:260px">
  <button id="go"
    style="padding:10px 14px;border-radius:10px;border:0;background:#ff2bd6;color:#000;font-weight:900;margin-left:8px;cursor:pointer">
    Generate configs
  </button>

  <div id="dl" style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;"></div>

  <pre id="out" style="margin-top:16px;white-space:pre-wrap;background:#0008;padding:12px;border-radius:12px"></pre>

  <script>
    const out = document.getElementById("out");
    const dl = document.getElementById("dl");
    const params = new URLSearchParams(location.search);
    const token = params.get("t");

    if (!token) out.textContent = "Missing token. Open the link from your email.";

    function mkBtn(label, onClick){
      const b = document.createElement("button");
      b.textContent = label;
      b.style.cssText = "padding:10px 12px;border-radius:12px;border:0;cursor:pointer;font-weight:900;background:#00e7ff;color:#000";
      b.onclick = onClick;
      return b;
    }

    function downloadText(filename, text){
      const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 5000);
    }

    document.getElementById("go").onclick = async () => {
      dl.innerHTML = "";
      const device = document.getElementById("device").value.trim();
      if (!device) { out.textContent = "❌ Please enter a device name."; return; }

      out.textContent = "Working…";

      const r = await fetch("/api/activate-all", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ token, device })
      });

      const txt = await r.text();

      if (!r.ok) {
        out.textContent = "❌ Error:\n" + txt;
        return;
      }

      let data;
      try { data = JSON.parse(txt); } catch { out.textContent = "❌ Bad response:\n" + txt; return; }

      const configs = data.configs || {};
      const errors = data.errors || {};

      out.textContent =
        "✅ Generated configs.\n" +
        "Click to download each region:\n\n" +
        (errors.eu ? `EU error: ${JSON.stringify(errors.eu)}\n` : "") +
        (errors.us ? `US error: ${JSON.stringify(errors.us)}\n` : "") +
        (errors.sg ? `SG error: ${JSON.stringify(errors.sg)}\n` : "");

      if (configs.eu) dl.appendChild(mkBtn("Download EU (.conf)", () => downloadText(`bbvpn-eu-${device}.conf`, configs.eu)));
      if (configs.us) dl.appendChild(mkBtn("Download US (.conf)", () => downloadText(`bbvpn-us-${device}.conf`, configs.us)));
      if (configs.sg) dl.appendChild(mkBtn("Download SG (.conf)", () => downloadText(`bbvpn-sg-${device}.conf`, configs.sg)));

      if (!configs.eu && !configs.us && !configs.sg) {
        out.textContent += "\n\n❌ None succeeded.";
      }
    };
  </script>

  <p style="margin-top:16px;opacity:.9">
    Install WireGuard → Add tunnel → Import from file → select a downloaded <code>.conf</code>.
  </p>
</body>
