<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Activate — Big Booty VPN</title>

<body style="font-family:system-ui;background:#07020A;color:#f7e7ff;padding:24px">
  <h1>Activate your VPN</h1>
  <p>Enter a device name once — we’ll generate configs for <b>EU / US / SG</b>. Then download all the configs below!</p>

  <label>Device name</label><br/>
  <input id="device" placeholder="" autocomplete="off"
    style="padding:10px;border-radius:10px;border:1px solid #fff2;background:#000;color:#fff;min-width:260px">
  <button id="go"
    style="padding:10px 14px;border-radius:10px;border:0;background:#ff2bd6;color:#000;font-weight:900;margin-left:8px;cursor:pointer">
    Generate configs
  </button>

  <div id="dl" style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;"></div>

  <pre id="out" style="margin-top:16px;white-space:pre-wrap;background:#0008;padding:12px;border-radius:12px"></pre>

  <!-- JSZip -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>
    const out = document.getElementById("out");
    const dl = document.getElementById("dl");
    const params = new URLSearchParams(location.search);
    const token = params.get("t");

    if (!token) out.textContent = "Missing token. Open the link from your email.";

    function mkBtn(label, onClick){
      const b = document.createElement("button");
      b.textContent = label;
      b.style.cssText = "padding:10px 12px;border-radius:12px;border:0;cursor:pointer;font-weight:900;background:#00e7ff;color:#000";
      b.onclick = onClick;
      return b;
    }

    function mkPrimaryBtn(label, onClick){
      const b = document.createElement("button");
      b.textContent = label;
      b.style.cssText = `
        padding:14px 18px;
        border-radius:14px;
        border:0;
        cursor:pointer;
        font-weight:900;
        font-size:15px;
        background:#ffd54a;
        color:#000;
        box-shadow:0 0 0 2px rgba(255,255,255,.08), 0 8px 24px rgba(255,213,74,.25);
      `;
      b.onclick = onClick;
      return b;
    }

    function downloadBlob(filename, blob){
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
      }, 5000);
    }

    function downloadText(filename, text){
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      downloadBlob(filename, blob);
    }

    document.getElementById("go").onclick = async () => {
      dl.innerHTML = "";

      const device = document.getElementById("device").value.trim();
      if (!device) {
        out.textContent = "❌ Please enter a device name.";
        return;
      }

      out.textContent = "Working…";

      try {
        const r = await fetch("/api/activate-all", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, device })
        });

        const txt = await r.text();

        if (!r.ok) {
          out.textContent = "❌ Error:\n" + txt;
          return;
        }

        let data;
        try {
          data = JSON.parse(txt);
        } catch {
          out.textContent = "❌ Bad response:\n" + txt;
          return;
        }

        const configs = data.configs || {};
        const errors = data.errors || {};

        const available = [];
        if (configs.eu) available.push(["eu", configs.eu]);
        if (configs.us) available.push(["us", configs.us]);
        if (configs.sg) available.push(["sg", configs.sg]);

        out.textContent =
          "✅ Generated configs.\n" +
          "Use Download All (Recommended) for a ZIP archive, or download regions one by one.\n\n" +
          (errors.eu ? `EU error: ${JSON.stringify(errors.eu)}\n` : "") +
          (errors.us ? `US error: ${JSON.stringify(errors.us)}\n` : "") +
          (errors.sg ? `SG error: ${JSON.stringify(errors.sg)}\n` : "");

        if (available.length > 0) {
          dl.appendChild(
            mkPrimaryBtn("Download All (Recommended)", async () => {
              try {
                out.textContent = "📦 Building ZIP archive…";

                const zip = new JSZip();

                for (const [region, conf] of available) {
                  zip.file(`bbvpn-${region}-${device}.conf`, conf);
                }

                const blob = await zip.generateAsync({ type: "blob" });
                downloadBlob(`bbvpn-${device}-all-configs.zip`, blob);

                out.textContent =
                  "✅ ZIP archive downloaded.\n" +
                  `Included: ${available.map(([region]) => region.toUpperCase()).join(", ")}`;
              } catch (err) {
                out.textContent = "❌ Failed to build ZIP archive.\n" + (err?.message || String(err));
              }
            })
          );
        }

        if (configs.eu) {
          dl.appendChild(
            mkBtn("Download EU (.conf)", () => downloadText(`bbvpn-eu-${device}.conf`, configs.eu))
          );
        }

        if (configs.us) {
          dl.appendChild(
            mkBtn("Download US (.conf)", () => downloadText(`bbvpn-us-${device}.conf`, configs.us))
          );
        }

        if (configs.sg) {
          dl.appendChild(
            mkBtn("Download SG (.conf)", () => downloadText(`bbvpn-sg-${device}.conf`, configs.sg))
          );
        }

        if (!configs.eu && !configs.us && !configs.sg) {
          out.textContent += "\n\n❌ None succeeded.";
        }
      } catch (err) {
        out.textContent = "❌ Network/client error:\n" + (err?.message || String(err));
      }
    };
  </script>

  <p style="margin-top:16px;opacity:.9">
    Install WireGuard → Add tunnel → Import from file → select a downloaded <code>.conf</code>.
  </p>
</body>
