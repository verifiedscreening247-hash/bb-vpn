<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Activate — Big Booty VPN</title>

<body style="font-family:system-ui;background:#07020A;color:#f7e7ff;padding:24px">
  <h1>Activate your VPN</h1>
  <p>Pick a server + device name. Then download your WireGuard config.</p>

  <label>Server</label><br/>
  <select id="server"
    style="padding:10px;border-radius:10px;border:1px solid #fff2;background:#000;color:#fff;min-width:260px">
    <option value="us">US (New York)</option>
    <option value="eu">EU (Amsterdam)</option>
    <option value="sg">SG (Singapore)</option>
  </select>

  <div style="height:12px"></div>

  <label>Device name</label><br/>
  <input id="device" placeholder="e.g. basement pc for g00ning"
    style="padding:10px;border-radius:10px;border:1px solid #fff2;background:#000;color:#fff;min-width:260px">
  <button id="go"
    style="padding:10px 14px;border-radius:10px;border:0;background:#ff2bd6;color:#000;font-weight:900;margin-left:8px;cursor:pointer">
    Generate & Download
  </button>

  <pre id="out" style="margin-top:16px;white-space:pre-wrap;background:#0008;padding:12px;border-radius:12px"></pre>

  <script>
    const out = document.getElementById("out");
    const params = new URLSearchParams(location.search);
    const token = params.get("t");

    const serverEl = document.getElementById("server");
    const savedServer = localStorage.getItem("bbvpn_server");
    serverEl.value = savedServer ? savedServer : "us";
    serverEl.onchange = () => localStorage.setItem("bbvpn_server", serverEl.value);

    if (!token) out.textContent = "Missing token. Open the link from your email.";

    document.getElementById("go").onclick = async () => {
      const device = document.getElementById("device").value.trim();
      const region = serverEl.value;

      out.textContent = "Working...";

      const r = await fetch("/api/activate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        // IMPORTANT: Worker expects `region`, not `server`
        body: JSON.stringify({ token, device, region })
      });

      if (!r.ok) {
        const err = await r.text();
        out.textContent = "❌ Error:\n" + err;
        return;
      }

      const blob = await r.blob();
      out.textContent = `✅ Received ${blob.size} bytes. Downloading...`;

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `bbvpn-${region}-${device}.conf`;
      document.body.appendChild(a);
      a.click();

      // IMPORTANT: don't revoke immediately, can produce 0-byte downloads in some browsers
      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
        out.textContent += "\n✅ Import the .conf into WireGuard (Add tunnel → Import from file).";
      }, 30000);
    };
  </script>

  <p style="margin-top:16px;opacity:.9">
    WireGuard app → <b>Add tunnel</b> → <b>Import from file</b>.
  </p>
</body>
